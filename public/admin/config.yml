media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://vericred.pages.dev
display_url: https://vericred.pages.dev

locale: "zh_Hans"

collections:
  - name: "suppliers"
    label: "🏭 供应商管理"
    label_singular: "供应商"
    editor:
      preview: false
    files:
      - name: "suppliers_data"
        label: "供应商列表"
        file: "public/data/suppliers.json"
        fields:
          - name: "suppliers"
            label: "供应商条目"
            widget: "list"
            summary: "{{nameCn}} · {{fields.industry}} · {{fields.region}} · 信任分{{fields.trustScore}}"
            collapsed: true
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "唯一标识，如 sup-001" }
              - { label: "中文名称", name: "nameCn", widget: "string" }
              - { label: "英文名称", name: "nameEn", widget: "string" }
              - label: "行业分类"
                name: "industry"
                widget: "select"
                options:
                  - { label: "机械设备", value: "machinery" }
                  - { label: "能源", value: "energy" }
                  - { label: "纺织服装", value: "textile" }
                  - { label: "电子电器", value: "electronics" }
              - label: "所在区域"
                name: "region"
                widget: "select"
                options:
                  - { label: "东南亚", value: "sea" }
                  - { label: "非洲", value: "africa" }
                  - { label: "印度", value: "india" }
                  - { label: "伊朗", value: "iran" }
                  - { label: "欧盟", value: "eu" }
              - { label: "Logo 缩写", name: "logoText", widget: "string" }
              - { label: "中文描述", name: "descriptionCn", widget: "text" }
              - { label: "英文描述", name: "descriptionEn", widget: "text" }
              - { label: "信任评分", name: "trustScore", widget: "number", value_type: "int", min: 0, max: 100, default: 90 }
              - { label: "成立年份", name: "establishedYear", widget: "number", value_type: "int", default: 2020 }
              - { label: "核验员工数", name: "verifiedWorkers", widget: "number", value_type: "int", default: 100 }
              - { label: "厂区面积 (m²)", name: "plantAreaSqM", widget: "number", value_type: "int", default: 5000 }
              - { label: "工商注册核验 ✓", name: "registryVerified", widget: "boolean", default: false }
              - { label: "实地探访核验 ✓", name: "siteVerified", widget: "boolean", default: false }
              - { label: "海关数据核验 ✓", name: "customsVerified", widget: "boolean", default: false }
              - { label: "财务信度核验 ✓", name: "financeVerified", widget: "boolean", default: false }
              - label: "资质证书"
                name: "certificates"
                widget: "list"
                summary: "{{cert}}"
                field: { label: "证书名称", name: "cert", widget: "string" }

  - name: "merchants"
    label: "🏪 市场商家管理"
    label_singular: "市场商家"
    editor:
      preview: false
    files:
      - name: "merchants_data"
        label: "市场商家列表"
        file: "public/data/merchants.json"
        fields:
          - name: "merchants"
            label: "商家条目"
            widget: "list"
            summary: "{{nameCn}} · {{fields.market}} · {{fields.industry}} 信任分{{fields.trustScore}}"
            collapsed: true
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "中文名称", name: "nameCn", widget: "string" }
              - { label: "英文名称", name: "nameEn", widget: "string" }
              - label: "所属市场"
                name: "market"
                widget: "select"
                options:
                  - { label: "中国", value: "china" }
                  - { label: "东南亚", value: "southeast" }
                  - { label: "非洲", value: "africa" }
                  - { label: "印度", value: "india" }
                  - { label: "伊朗", value: "iran" }
              - label: "行业"
                name: "industry"
                widget: "select"
                options:
                  - { label: "机械设备", value: "machinery" }
                  - { label: "五金建材", value: "hardware" }
                  - { label: "纺织", value: "textile" }
                  - { label: "化工", value: "chemical" }
                  - { label: "制药", value: "pharma" }
                  - { label: "电子", value: "electronics" }
              - { label: "中文地址", name: "addressCn", widget: "string" }
              - { label: "英文地址", name: "addressEn", widget: "string" }
              - label: "核验类型"
                name: "verificationTypes"
                widget: "list"
                summary: "{{type}}"
                field:
                  label: "核验方式"
                  name: "type"
                  widget: "select"
                  options:
                    - { label: "视频探访", value: "video" }
                    - { label: "工商注册", value: "registry" }
                    - { label: "海关数据", value: "customs" }
                    - { label: "交叉核验", value: "cross" }
              - { label: "信任评分", name: "trustScore", widget: "number", value_type: "int", min: 0, max: 100, default: 90 }
              - { label: "成立年份", name: "establishedYear", widget: "number", value_type: "int", default: 2020 }
              - { label: "联系人", name: "contactPerson", widget: "string" }
              - { label: "认证产能", name: "certifiedOutput", widget: "string" }
              - label: "核验日志"
                name: "verificationLogs"
                widget: "list"
                field: { label: "日志内容", name: "log", widget: "text" }

  - name: "matchmaking"
    label: "🤝 供需匹配管理"
    label_singular: "匹配记录"
    editor:
      preview: false
    files:
      - name: "matchmaking_data"
        label: "供需匹配列表"
        file: "public/data/matchmaking.json"
        fields:
          - name: "requests"
            label: "匹配记录"
            widget: "list"
            summary: "{{sourceCn}} ➜ {{fields.targetRegion}} 【{{fields.status}}】"
            collapsed: true
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "时间描述", name: "timestamp", widget: "string" }
              - { label: "需求来源 (中文)", name: "sourceCn", widget: "string" }
              - { label: "需求来源 (英文)", name: "sourceEn", widget: "string" }
              - { label: "目标区域", name: "targetRegion", widget: "string" }
              - { label: "需求描述 (中文)", name: "requirementCn", widget: "text" }
              - { label: "需求描述 (英文)", name: "requirementEn", widget: "text" }
              - label: "匹配状态"
                name: "status"
                widget: "select"
                options:
                  - { label: "已匹配", value: "matched" }
                  - { label: "核验中", value: "verifying" }
                  - { label: "已完成", value: "completed" }
